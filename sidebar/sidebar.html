<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar AI</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Sidebar AI</span>
    </div>
    <div class="topbar-actions">
      <select id="activeModelSelect" title="切换当前模型"></select>
      <button type="button" id="collapseBtn" class="icon-btn" title="折叠/展开" aria-label="折叠/展开">⇆</button>
      <button type="button" id="openSettingsBtn" class="icon-btn" title="设置" aria-label="设置">⚙</button>
    </div>
  </header>

  <nav class="tabs">
    <button type="button" class="tab active" data-tab="summary">总结</button>
    <button type="button" class="tab" data-tab="translate">翻译</button>
    <button type="button" class="tab" data-tab="chat">对话</button>
    <button type="button" class="tab" data-tab="history">历史</button>
  </nav>

  <main class="content">
    <!-- SUMMARY -->
    <section class="panel active" id="panel-summary">
      <div class="action-row">
        <select id="summaryTemplateSelect" class="template-select" title="总结模板选择"></select>
        <select id="summaryLengthSelect" class="length-select" title="总结长度选择">
          <option value="short">简短</option>
          <option value="medium" selected>中等</option>
          <option value="long">详尽</option>
        </select>
        <button type="button" id="summaryBtn" class="primary-btn">总结当前页</button>
        <button type="button" id="summaryCompareBtn" class="ghost-btn" title="多模型对比">对比</button>
      </div>
      <div class="hint" id="summaryHint"></div>
      <article class="result" id="summaryResult" aria-live="polite"></article>
      <div class="compare-results" id="compareResults" hidden></div>
    </section>

    <!-- TRANSLATE -->
    <section class="panel" id="panel-translate">
      <div class="action-row">
        <select id="targetLangSelect" class="lang-select" title="目标语言选择">
          <option value="zh-CN">中文（简体）</option>
          <option value="zh-TW">中文（繁體）</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
        </select>
        <select id="translateTemplateSelect" class="template-select" title="翻译模板选择"></select>
        <label class="bilingual-toggle" title="开启后用中英对照翻译">
          <input type="checkbox" id="translateBilingualToggle" />
          <span>双语</span>
        </label>
        <button type="button" id="translateBtn" class="primary-btn">翻译当前页</button>
      </div>
      <div class="hint" id="translateHint"></div>
      <article class="result" id="translateResult" aria-live="polite"></article>
    </section>

    <!-- CHAT -->
    <section class="panel" id="panel-chat">
      <div class="chat-toolbar">
        <label class="chat-context-toggle" title="开启后会抓取当前页面的内容作为上下文">
          <input type="checkbox" id="chatContextToggle" checked />
          <span>附带当前页面</span>
        </label>
        <button type="button" id="chatExportBtn" class="ghost-btn" title="导出当前对话为 .md">导出</button>
        <button type="button" id="chatClearBtn" class="ghost-btn" title="清空对话">清空</button>
      </div>
      <div class="chat-list" id="chatList"></div>
      <div class="chat-input-row">
        <textarea id="chatInput" placeholder="基于当前页面问答…（Shift+Enter 换行，Enter 发送）" rows="2"></textarea>
        <button type="button" id="chatSendBtn" class="primary-btn">发送</button>
      </div>
    </section>

    <!-- HISTORY -->
    <section class="panel" id="panel-history">
      <div class="action-row">
        <span class="hint" id="historyHint"></span>
        <button type="button" id="historyExportBtn" class="ghost-btn">导出</button>
        <button type="button" id="historyClearBtn" class="ghost-btn">清空</button>
      </div>
      <div class="history-search-row">
        <input type="text" id="historySearchInput" placeholder="搜索历史（标题/内容/域名）..." />
      </div>
      <ul class="history-list" id="historyList"></ul>
    </section>
  </main>

  <footer class="statusbar" id="statusbar">就绪</footer>

  <!-- 顶部工具栏（图片识别入口） -->
  <button type="button" id="visionBtn" class="vision-fab" title="识别图片：在图片上右键 → 用 Sidebar AI 识别；或点这里对当前页面所有图片识别" aria-label="识别图片">
    🖼
  </button>

  <!-- 错误/通知弹窗 -->
  <dialog id="noticeDialog" class="notice-dialog">
    <div class="notice-header">
      <span class="notice-icon" id="noticeIcon">!</span>
      <h3 class="notice-title" id="noticeTitle">提示</h3>
    </div>
    <div class="notice-body" id="noticeBody"></div>
      <div class="notice-actions">
      <div id="noticeExtras" class="notice-extras hidden"></div>
      <button type="button" id="noticeCopyBtn" class="ghost-btn hidden">复制错误详情</button>
      <button type="button" id="noticeCloseBtn" class="primary-btn">关闭</button>
    </div>
  </dialog>
  <!-- 错误未读徽章（绝对定位的小圆点） -->
  <div id="errorBadge" class="error-badge hidden" title="未读错误"></div>

  <!-- 多模型对比选择弹窗 -->
  <dialog id="compareDialog" class="dialog">
    <form method="dialog">
      <h2>多模型对比</h2>
      <p class="hint">勾选 2-4 个模型，结果会并排显示在总结面板下方。</p>
      <div id="compareModelList" class="models-list models-scroll"></div>
      <div class="dialog-actions">
          <button type="button" value="cancel" class="ghost-btn">取消</button>
          <button type="button" value="run" class="primary-btn" id="compareRunBtn">开始对比</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
