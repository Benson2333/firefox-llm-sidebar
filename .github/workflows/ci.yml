name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint + Static Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install acorn
        run: npm install --no-save acorn

      - name: Run acorn static check
        run: node parse-all.mjs

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Run web-ext lint
        run: web-ext lint --source-dir=. --warnings-as-errors=false

  build:
    name: Build .xpi
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build
        run: web-ext build --source-dir=. --artifacts-dir=./dist --overwrite-dest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidebar-ai-${{ github.sha }}
          path: dist/
